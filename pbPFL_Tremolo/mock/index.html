<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=920, initial-scale=1.0">
  <title>pbPFL Tremolo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="plugin-container">
    <header class="header">
      <div class="brand">
        <svg class="brand-logo" viewBox="0 0 64 64" aria-hidden="true">
  <defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#4296fa"/><stop offset="1" stop-color="#2dd4a8"/></linearGradient></defs>
  <rect x="6" y="6" width="52" height="52" rx="10" fill="#182744" stroke="#3d5786" stroke-width="2"/>
  <path d="M18 42V20h14c7 0 11 4 11 10s-4 10-11 10h-7v2h-7zm7-9h7c3 0 5-1 5-3s-2-3-5-3h-7v6z" fill="url(#g)"/>
</svg>
        <div class="brand-text"><div class="product-name">pbPFL Tremolo</div><div class="maker-name">pbTechLab PrimitiveFxLibrary</div></div>
      </div>
      <div class="header-center">
        <button class="icon-btn" id="undoBtn" type="button" title="Undo">&#8630;</button>
        <button class="icon-btn" id="redoBtn" type="button" title="Redo">&#8631;</button>
        <div class="ab-container"><button class="ab-btn active" type="button" data-slot="A">A</button><button class="ab-btn" type="button" data-slot="B">B</button></div>
        <button class="nav-arrow" id="prevPreset" type="button" title="Previous preset">&#8249;</button>
        <select class="preset-select" aria-label="Preset"><option>Default</option><option>Subtle</option><option>Wide</option><option>Intense</option></select>
        <button class="nav-arrow" id="nextPreset" type="button" title="Next preset">&#8250;</button>
        <button class="icon-btn icon-only" id="savePresetBtn" type="button" title="Save Preset" aria-label="Save"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg></button>
      </div>
      <div class="header-right">
        <button class="icon-btn icon-only" id="helpBtn" type="button" title="Help" aria-label="Help"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 1 1 5.8 1c-.6 1.2-1.9 1.7-2.5 2.7"/><path d="M12 17h.01"/></svg></button>
        <button class="icon-btn icon-only btn-bypass" type="button" title="Bypass" aria-label="Bypass"><svg viewBox="0 0 24 24"><path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/></svg></button>
      </div>
    </header>
    <main class="main"><section class="knob-row" aria-label="Parameters"></section></main>
    <footer class="footer">
      <div class="footer-right">
        <span class="footer-item">v1.0.0</span>
      </div>
    </footer>
  </div>
  <script>const PLUGIN_PARAMS = [{"max":120,"defaultValue":4.0,"unit":"Hz","min":0.03,"value":4.0,"step":0.01,"name":"Rate","id":"rate"},{"max":100,"defaultValue":65,"unit":"%","min":0,"value":65,"step":1,"name":"Depth","id":"depth"},{"max":100,"defaultValue":45,"unit":"%","min":0,"value":45,"step":1,"name":"Shape","id":"shape"},{"max":180,"defaultValue":0,"unit":"deg","min":0,"value":0,"step":1,"name":"Stereo","id":"stereo"},{"max":100,"defaultValue":20,"unit":"%","min":0,"value":20,"step":1,"name":"Smooth","id":"smooth"},{"max":100,"defaultValue":100,"unit":"%","min":0,"value":100,"step":1,"name":"Dry/Wet","id":"dryWet"},{"max":12,"defaultValue":0,"unit":"dB","min":-24,"value":0,"step":0.1,"name":"Output","id":"output"}];</script>
  <script src="script.js"></script>
</body>
</html>
